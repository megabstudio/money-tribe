<!-- @dsCard group="Spacing" viewport="700x170" name="Radius scale" subtitle="Figma corner set · sharp → pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); }
  .row { display: flex; gap: 18px; }
  .item { text-align: center; }
  .box { width: 84px; height: 60px; background: var(--green-100); border: 1.5px solid var(--primary); }
  .lab { font-size: 11px; color: var(--text-body); margin-top: 8px; font-weight: 700; }
  .v { font-size: 10px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row" id="r"></div>
  <script>
    const rad = [["none","0"],["xs","4"],["sm","8"],["md","12"],["lg","16"],["xl","24"],["pill","999"]];
    document.getElementById("r").innerHTML = rad.map(([k,v]) =>
      `<div class="item"><div class="box" style="border-radius:var(--radius-${k})"></div><div class="lab">${k}</div><div class="v">${v}px</div></div>`).join("");
  </script>
</body>
</html>
