<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); color: var(--text-body); display:flex; flex-direction:column; gap:10px; }
  .h1 { font-size: var(--text-3xl); font-weight: 800; letter-spacing: -0.02em; }
  .h2 { font-size: var(--text-2xl); font-weight: 700; letter-spacing: -0.01em; }
  .h3 { font-size: var(--text-xl); font-weight: 700; }
  .meta { font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="h1">Save together, faster</div>
  <div class="h2">Your weekly pot</div>
  <div class="h3">Round-ups this month</div>
  <div class="meta">Manrope · 800 / 700 · --text-3xl / 2xl / xl</div>
</body>
</html>
