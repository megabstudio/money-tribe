<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-display); display:flex; align-items:center; gap:48px; }
  .lock { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .mark { color: var(--green-600); width: 88px; height: 88px; }
  .word { font-family: var(--font-display); font-weight: 400; font-size: 30px; line-height: 0.92; text-align:center; color: var(--green-800); }
  .horiz { display:flex; align-items:center; gap:16px; }
  .horiz .mark { width: 54px; height: 54px; }
  .horiz .word { font-size: 30px; text-align:left; }
</style>
</head>
<body>
  <div class="lock">
    <img class="mark" src="../assets/logo-mark.svg" alt="Money Tribe mark" />
    <div class="word">Money<br/>Tribe</div>
  </div>
  <div class="horiz">
    <img class="mark" src="../assets/logo-mark.svg" alt="Money Tribe mark" />
    <div class="word">Money Tribe</div>
  </div>
</body>
</html>
