<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--background); font-family: var(--font-sans); color: var(--text-body); display:flex; flex-direction:column; gap:8px; }
  .body { font-size: var(--text-base); font-weight: 400; line-height: 1.5; max-width: 560px; }
  .label { font-size: var(--text-sm); font-weight: 600; }
  .cap { font-size: var(--text-xs); font-weight: 500; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="body">A money tribe is a small circle of people saving toward the same goal — split the pot, hit the target together.</div>
  <div class="label">Label · 14px / 600</div>
  <div class="cap">Caption · 12px / 500 · --text-subtle</div>
</body>
</html>
