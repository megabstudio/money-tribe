<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Money Tribe — App UI kit</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; gap: 40px;
         background: radial-gradient(circle at 30% 20%, var(--green-50), var(--surface-muted)); font-family: var(--font-sans); padding: 40px; flex-wrap: wrap; }
  .toggle { position: fixed; top: 16px; right: 16px; z-index: 10; font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: var(--radius-pill); border: 1.5px solid var(--border); background: var(--surface-card); color: var(--text-body); cursor: pointer; }
</style>
</head>
<body>
  <button class="toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')">◑ light / dark</button>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="AppScreens.jsx"></script>
  <script type="text/babel">
    const App = window.MoneyTribeApp;
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
