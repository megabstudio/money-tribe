<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--background); font-family: var(--font-sans); color: var(--text-body); min-height: 300px; }
  .toggle { position: fixed; top: 14px; right: 14px; font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: var(--radius-pill); border: 1.5px solid var(--border); background: var(--surface-card); color: var(--text-body); cursor: pointer; }
  .hint { font-size: 13px; color: var(--text-subtle); margin-top: 14px; }
</style>
</head>
<body>
  <button class="toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')">◑ theme</button>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, Dialog } = window.MoneyTribeDesignSystem_5369ed;
    function Demo() {
      const [open, setOpen] = React.useState(true);
      return (
        <div>
          <Button variant="primary" onClick={() => setOpen(true)}>Open dialog</Button>
          <p className="hint">Click the button (or overlay / Esc) to toggle. Opens by default for preview.</p>
          <Dialog
            open={open} onOpenChange={setOpen}
            title="Leave this tribe?"
            description="You'll stop contributing to the shared pot, but your saved balance stays yours."
            footer={<>
              <Button variant="ghost" onClick={() => setOpen(false)}>Cancel</Button>
              <Button variant="dark" onClick={() => setOpen(false)}>Leave tribe</Button>
            </>}
          >
            <div style={{fontSize:14, color:"var(--text-subtle)"}}>You're 42% of the way to the £10,000 goal with 5 other members.</div>
          </Dialog>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
