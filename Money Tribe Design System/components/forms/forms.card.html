<!-- @dsCard group="Components" viewport="700x520" name="Forms" subtitle="Button · Input · Checkbox · Radio · Switch · Select" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--background); font-family: var(--font-sans); color: var(--text-body); }
  .toggle { position: fixed; top: 14px; right: 14px; font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: var(--radius-pill); border: 1.5px solid var(--border); background: var(--surface-card); color: var(--text-body); cursor: pointer; }
  .sec { font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-subtle); margin: 4px 0 12px; }
  .group { margin-bottom: 22px; }
  .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
</style>
</head>
<body>
  <button class="toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')">◑ theme</button>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button, IconButton, Input, Checkbox, RadioGroup, Radio, Switch, Select, Label } = window.MoneyTribeDesignSystem_5369ed;
    const Search = (p) => <svg viewBox="0 0 16 16" width="16" height="16" fill="none" {...p}><circle cx="7" cy="7" r="5" stroke="currentColor" strokeWidth="1.8"/><path d="M11 11l3.5 3.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>;

    function Demo() {
      const [c1, setC1] = React.useState(true);
      const [sw, setSw] = React.useState(true);
      return (
        <div>
          <div className="group">
            <div className="sec">Buttons</div>
            <div className="row" style={{marginBottom:12}}>
              <Button variant="primary" size="lg">Join tribe</Button>
              <Button variant="secondary" size="lg">Accept</Button>
              <Button variant="dark" size="lg">Save</Button>
              <Button variant="outline" size="lg">Invite</Button>
              <Button variant="outline-dark" size="lg">Details</Button>
              <Button variant="ghost" size="lg">Skip</Button>
              <Button variant="primary" size="lg" disabled>Disabled</Button>
            </div>
            <div className="row">
              <Button variant="primary" shape="pill" leftIcon={<Search/>}>Search</Button>
              <Button variant="outline" shape="pill">Pill</Button>
              <Button variant="primary" shape="sharp">Sharp</Button>
              <Button variant="primary" size="sm">Small</Button>
              <IconButton aria-label="Search" variant="primary"><Search/></IconButton>
              <IconButton aria-label="Search" variant="outline" shape="pill"><Search/></IconButton>
              <IconButton aria-label="Search" variant="dark"><Search/></IconButton>
            </div>
          </div>

          <div className="group">
            <div className="sec">Inputs</div>
            <div className="row">
              <div style={{width:220}}><Input placeholder="you@email.com" /></div>
              <div style={{width:220}}><Input leftIcon={<Search/>} placeholder="Search the tribe" /></div>
              <div style={{width:160}}><Input invalid defaultValue="bad@" /></div>
              <div style={{width:200}}><Select placeholder="Goal" options={[{value:"house",label:"House deposit"},{value:"trip",label:"Trip fund"},{value:"car",label:"New car"}]} /></div>
            </div>
          </div>

          <div className="group">
            <div className="sec">Choice</div>
            <div className="row" style={{gap:32, alignItems:"flex-start"}}>
              <div style={{display:"flex", flexDirection:"column", gap:10}}>
                <Checkbox label="Round up purchases" checked={c1} onCheckedChange={setC1} />
                <Checkbox label="Weekly reminders" defaultChecked />
                <Checkbox label="Unavailable" disabled />
              </div>
              <RadioGroup defaultValue="weekly">
                <Radio value="weekly" label="Weekly" />
                <Radio value="monthly" label="Monthly" />
                <Radio value="payday" label="On payday" />
              </RadioGroup>
              <div style={{display:"flex", flexDirection:"column", gap:12}}>
                <Switch label="Auto-save" checked={sw} onCheckedChange={setSw} />
                <Switch label="Notifications" defaultChecked />
                <Switch label="Off" />
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
