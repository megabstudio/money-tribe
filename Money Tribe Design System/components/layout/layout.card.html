<!-- @dsCard group="Components" viewport="700x300" name="Cards & Avatars" subtitle="Surface containers, avatar groups" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface-muted); font-family: var(--font-sans); color: var(--text-body); }
  .toggle { position: fixed; top: 14px; right: 14px; font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: var(--radius-pill); border: 1.5px solid var(--border); background: var(--surface-card); color: var(--text-body); cursor: pointer; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
  <button class="toggle" onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')">◑ theme</button>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, CardHeader, Avatar, AvatarGroup, Badge, Button } = window.MoneyTribeDesignSystem_5369ed;
    function Demo() {
      return (
        <div className="grid">
          <Card>
            <CardHeader title="House deposit" subtitle="£4,200 of £10,000" action={<Badge>On track</Badge>} />
            <div style={{height:8, borderRadius:99, background:"var(--muted)", overflow:"hidden", marginBottom:14}}>
              <div style={{width:"42%", height:"100%", background:"var(--primary)"}}/>
            </div>
            <AvatarGroup max={4}>
              <Avatar name="Ada Lin"/><Avatar name="Ben Ojo"/><Avatar name="Cai Wu"/><Avatar name="Dee Roy"/><Avatar name="Eli Fox"/>
            </AvatarGroup>
          </Card>
          <Card interactive selected>
            <CardHeader title="Trip fund" subtitle="Tap to open" />
            <p style={{fontSize:14, color:"var(--text-subtle)", margin:0}}>Selected / interactive card with hover lift.</p>
            <div style={{marginTop:16}}><Button variant="primary" size="sm">Add money</Button></div>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
